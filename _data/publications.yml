  title: "Impacts of chemical degradation on the global budget of atmospheric levoglucosan and its use as a biomass burning tracer"
  authors: "<strong>Li Yumin</strong>, Tzung-May Fu*, Jian Zhen Yu*, Xu Feng, Lijuan Zhang, Jing Chen, Suresh Kumar Reddy Boreddy, Kimitaka Kawamura, Pingqing Fu, Xin Yang, Lei Zhu, and Zhenzhong Zeng"
  journal: "Environmental Science & Technology"
  citation_details: "2021, 55, 8, 5525-5536"
  status: "Published"
  article_url: "https://doi.org/10.1021/acs.est.0c07313"
  image: "/publications/images/Li%20Yumin%20EST%202021.png"
  highlights:
    - "The work developed the first global simulation of atmospheric levoglucosan with explicit chemical degradation."
    - "Accounting for degradation is necessary to reproduce the observed decline of levoglucosan from source to remote regions."
    - "The estimated global atmospheric burden of levoglucosan is 19 Gg with an average lifetime of 1.8 days."
    - "The study improves the use of levoglucosan measurements in biomass-burning source apportionment."

