  featured_home: true
  title: "Nitrogen dominates global atmospheric organic aerosol absorption"
  authors: "<strong>Li Yumin</strong>, Tzung-May Fu*, Jian Zhen Yu*, Aoxing Zhang, Xu Yu, Jianhuai Ye, Lei Zhu, Huizhong Shen, Chen Wang, Xin Yang, Shu Tao, Qi Chen, Ying Li, Lei Li, Huizheng Che, Colette L. Heald"
  journal: "Science"
  citation_details: "2025, 387, 6737, 989-995"
  status: "Published"
  article_url: "https://doi.org/10.1126/science.adr4473"
  image: "/publications/images/Li%20Yumin%20Science%202026.png"
  highlights:
    - "BrN contributes 76% of organic aerosol light absorption over the U.S. and 61% globally, with biomass burning as the largest source."
    - "BrN absorptive capacity decreases significantly with aging, with variability driven by seasonal and spatial factors."
    - "BrN accounts for 18% of the global absorptive direct radiative effect of carbonaceous aerosols, with a mean radiative forcing of 0.034 W/m^2."
    - "The study provides a nitrogen-focused approach to assessing the climate impacts of organic aerosols, emphasizing chemical evolution and radiative absorption."

- order: 2
  home_rank: 2
  featured_home: true
  title: "Organic nitrogen: a key to unlocking the climate impacts of organic aerosols"
  authors: "<strong>Li Yumin</strong>, Kezheng Liao, Tzung-May Fu*, and Jian Zhen Yu*"
  journal: "Chinese Science Bulletin"
  citation_details: "2025, 70, 35, 5932-5935"
  status: "Published"
  article_url: "https://doi.org/10.1360/CSB-2025-5511"
  image: "/publications/images/Li%20Yumin%20CSB%202025.png"
  highlights:
    - "This perspective argues that organic nitrogen is central to understanding the climate impacts of organic aerosols."
    - "It motivates a shift from bulk carbon-centered thinking toward composition-aware attribution of aerosol absorption."
    - "The article connects recent laboratory, field, and model evidence to future research priorities."

- order: 3
  home_rank: 3
  featured_home: true
  title: "Dissecting the contributions of organic nitrogen aerosols in global atmospheric N deposition"
  authors: "<strong>Li Yumin</strong>, Tzung-May Fu*, Jian Zhen Yu*, Xu Yu, Qi Chen, Ruqian Miao, Yang Zhou, Aoxing Zhang, Jianhuai Ye, Xin Yang, Shu Tao, Hongbin Liu, and Weiqi Yao"
  journal: "National Science Review"
  citation_details: "2023, 10, nwad244"
  status: "Published"
  article_url: "https://doi.org/10.1093/nsr/nwad244"
  image: "/publications/images/Li%20Yumin%20NSR%202023.png"
  highlights:
    - "Global atmospheric organic nitrogen deposition is estimated at 26 Tg N yr^-1, predominantly in particulate form."
    - "Wildfires, oceans, and aqueous production are the dominant sources of particulate organic nitrogen deposition."
    - "Organic nitrogen contributes 40% to 80% of total nitrogen deposition downwind of biomass-burning regions."
    - "Atmospheric organic nitrogen deposition is a major external nitrogen supply to N-limited boreal forests, tundras, and the Arctic Ocean."

- order: 4
