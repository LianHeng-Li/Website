<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-brand" href="{{ '/home/' | relative_url }}">
        <span class="site-brand-title">{{ site.title }}</span>
        <span class="site-brand-subtitle">{{ site.tagline }}</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/home/' | relative_url }}" {% if page.nav == 'home' %}aria-current="page"{% endif %}>Home</a>
        <a href="{{ '/news/' | relative_url }}" {% if page.nav == 'news' %}aria-current="page"{% endif %}>News</a>
        <a href="{{ '/publications/' | relative_url }}" {% if page.nav == 'publications' %}aria-current="page"{% endif %}>Publications</a>
        <a href="{{ '/projects/' | relative_url }}" {% if page.nav == 'projects' %}aria-current="page"{% endif %}>Projects</a>
        <a href="{{ '/contact/' | relative_url }}" {% if page.nav == 'contact' %}aria-current="page"{% endif %}>Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    {% if page.hero_title %}
    <section class="hero-block">
      <p class="hero-kicker">{{ page.hero_kicker | default: site.tagline }}</p>
      <h1>{{ page.hero_title }}</h1>
      {% if page.hero_text %}
      <p class="hero-text">{{ page.hero_text }}</p>
      {% endif %}
    </section>
    {% endif %}

    <section class="content-card">
      {{ content }}
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <p>{{ site.footer_text }}</p>
    </div>
  </footer>
</body>
</html>
